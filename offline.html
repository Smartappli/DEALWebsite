<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="description"
          content="Offline fallback page for the DEAL suite PWA.">
    <meta name="keywords" content="DEALIoT, DEALHost, DEALData, PWA, offline">
    <meta name="robots" content="noindex, follow">
    <meta name="theme-color" content="#f7fcff">
    <title>DEAL | Offline</title>
    <link rel="icon" href="assets/mark.svg" type="image/svg+xml">
    <link rel="manifest" href="site.webmanifest">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="offline-body">
    <main class="offline-shell">
      <span class="brand-mark" aria-hidden="true">D</span>
      <p class="eyebrow">Offline mode</p>
      <h1>The DEAL site is available offline.</h1>
      <p>
        Your connection is unavailable. Previously cached pages remain accessible, and the app will refresh when the network returns.
      </p>
      <a class="button primary" href="./">Back to the site</a>
    </main>
  </body>
</html>
